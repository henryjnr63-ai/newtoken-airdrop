<script>
// ====================== SUPABASE CONFIGURATION ======================
const SUPABASE_URL = "https://ukfoeorwimvfjmkvbyqz.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_Tru93y3LkdD0II3wIt02dg_3qnlQVm1";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ====================== APP STATE ======================
const BASE_TOKENS = 5000;
const PRICE = 0.10;
let connected = false;
let cw = null; // Stores details for active session: { name, addr, type: 'evm' | 'sol' }
let dbData = { wallets: {} };

// ====================== CORE UTILITIES ======================
function shortAddr(addr) { 
    return addr ? addr.slice(0,6)+'...'+addr.slice(-4) : ''; 
}

function getRefFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('ref') || null;
}

function generateRef(addr) {
    return btoa(addr).replace(/[^a-zA-Z0-9]/g,'').slice(0,10);
}

// ====================== SUPABASE DATABASE SYNC ======================
async function loadDB() {
    try {
        const { data, error } = await supabase
            .from('signatures')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) throw error;

        dbData.wallets = {};
        data.forEach(row => {
            dbData.wallets[row.wallet_address] = {
                addr: row.wallet_address,
                ref: generateRef(row.wallet_address),
                referredBy: row.referred_by, 
                verifiedAt: row.created_at
            };
        });

        updateClaimedCount();
        console.log(`✅ Loaded ${data.length} wallets from Supabase`);
    } catch(e) {
        console.error("Supabase data load failure:", e);
    }
}

function updateClaimedCount() {
    const count = Object.keys(dbData.wallets || {}).length;
    const el = document.getElementById('lClaimed');
    if (el) el.textContent = (14382 + count).toLocaleString();
}

// ====================== CONNECT & SIGN OPERATIONS ======================

// --- EVM / ETH / USDT (MetaMask, Coinbase, etc.) ---
async function connectEVM() {
    if (!window.ethereum) {
        alert("No Web3 wallet detected. Please use MetaMask or an integrated dApp browser.");
        return;
    }
    try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        const provider = new ethers.BrowserProvider(window.ethereum);
        const signer = await provider.getSigner();
        const account = accounts[0];

        cw = { name: "EVM Wallet", addr: account, type: "evm" };
        
        const message = `$NEWTOKEN Airdrop Verification\nWallet: ${account}\nDate: ${new Date().toISOString()}\nI confirm ownership over this wallet request.`;
        const signature = await signer.signMessage(message);

        await saveToDatabase(account.toLowerCase(), signature, message);
    } catch (e) {
        console.error("EVM Connection or signing failed:", e);
        alert("Transaction authorization or verification rejected.");
    }
}

// --- SOLANA (Phantom, Solflare) ---
async function connectSolana() {
    // Detect Phantom or standard Solana injection provider
    const isPhantomInstalled = window.solana && window.solana.isPhantom;
    
    if (!isPhantomInstalled) {
        alert("Solana wallet extension not detected. Please install Phantom or Solflare.");
        return;
    }

    try {
        // Connect to the Solana provider
        const resp = await window.solana.connect();
        const walletAddress = resp.publicKey.toString();

        cw = { name: "Solana Wallet", addr: walletAddress, type: "sol" };

        const textMessage = `$NEWTOKEN Airdrop Verification\nWallet: ${walletAddress}\nDate: ${new Date().toISOString()}\nI confirm ownership over this wallet request.`;
        const encodedMessage = new TextEncoder().encode(textMessage);
        
        // Request signature via Solana runtime
        const signedMessage = await window.solana.signMessage(encodedMessage, "utf8");
        
        // Convert the Uint8Array signature back to a standard string format for storage
        const signatureString = btoa(String.fromCharCode.apply(null, signedMessage.signature));

        await saveToDatabase(walletAddress, signatureString, textMessage);
    } catch (e) {
        console.error("Solana connection or signing failed:", e);
        alert("Solana authorization or verification rejected.");
    }
}

// ====================== DATABASE STORAGE HANDLER ======================
async function saveToDatabase(address, signature, message) {
    try {
        const { error } = await supabase
            .from('signatures')
            .insert({
                wallet_address: address,
                signature: signature,
                message: message,
                referred_by: getRefFromURL()
            });

        if (error) throw error;

        await onVerified();
    } catch (e) {
        console.error("Database entry exception:", e);
    }
}

async function onVerified() {
    connected = true;
    const refCode = generateRef(cw.addr);
    await loadDB();

    // Dynamically updates your interface buttons across UI states
    const navBtn = document.getElementById('navBtn');
    if (navBtn) navBtn.innerHTML = `<button class="connect-btn">✅ ${shortAddr(cw.addr)}</button>`;
    
    const mainBtn = document.getElementById('mainClaimBtn');
    if (mainBtn) mainBtn.innerHTML = `<span>Airdrop Verified</span>`;

    const linkEl = document.getElementById('invLink');
    if (linkEl) {
        const inviteURL = window.location.origin + window.location.pathname + '?ref=' + refCode;
        linkEl.textContent = inviteURL;
    }

    if (typeof showScreen === "function") {
        showScreen('dashboard');
    }
}

// ====================== INITIALIZE APPLICATION ======================
loadDB();
</script>
