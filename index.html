<script>
// ====================== SUPABASE ======================
const SUPABASE_URL = "https://ukfoeorwimvfjmkvbyqz.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_Tru93y3LkdD0II3wIt02dg_3qnlQVm1";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ====================== CONFIG ======================
const BASE_TOKENS = 5000;
const PRICE = 0.10;
let connected = false;
let cw = null;
let dbData = { wallets: {} };

// ====================== HELPERS ======================
function shortAddr(addr) { 
  return addr ? addr.slice(0,6)+'...'+addr.slice(-4) : ''; 
}

function getRefFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('ref') || null;
}

function generateRef(addr) {
  return btoa(addr).replace(/[^a-zA-Z0-9]/g,'').slice(0,10);
}

// ====================== LOAD REAL DATA FROM SUPABASE ======================
async function loadDB() {
  try {
    const { data, error } = await supabase
      .from('signatures')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) throw error;

    dbData.wallets = {};
    data.forEach(row => {
      dbData.wallets[row.wallet_address] = {
        addr: row.wallet_address,
        ref: generateRef(row.wallet_address),
        referredBy: row.referred_by,        // ← Fixed: snake_case
        verifiedAt: row.created_at
      };
    });

    updateClaimedCount();
    console.log(`✅ Loaded ${data.length} wallets from Supabase`);
  } catch(e) {
    console.error("Supabase load error:", e);
  }
}

function updateClaimedCount() {
  const count = Object.keys(dbData.wallets || {}).length;
  const el = document.getElementById('lClaimed');
  if (el) el.textContent = (14382 + count).toLocaleString();
}

// ====================== WALLET CONNECTION ======================
let provider = null;
let signer = null;
let currentAccount = null;

async function connectEVM() {
  if (!window.ethereum) {
    showToast("No wallet detected. Please use MetaMask or wallet browser.");
    return;
  }
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();
    currentAccount = accounts[0];

    // Initialize cw early
    cw = {name: "EVM Wallet", addr: currentAccount, type: "evm"};
    
    showStep2(currentAccount);
  } catch (e) {
    showError(e.code === 4001 ? "Rejected" : "Connection failed");
  }
}

// ====================== SIGN & SAVE ======================
async function signAndVerify() {
  if (!signer || !currentAccount) {
    showError("Wallet not connected.");
    return;
  }

  const message = `$NEWTOKEN Airdrop Verification\nWallet: ${currentAccount}\nDate: ${new Date().toISOString()}\nI confirm I own this wallet.`;

  try {
    const signature = await signer.signMessage(message);

    // Save to Supabase
    const { error } = await supabase
      .from('signatures')
      .insert({
        wallet_address: currentAccount.toLowerCase(),
        signature: signature,
        message: message,
        referred_by: getRefFromURL()
      });

    if (error) console.error("Save error:", error);

    await onVerified(signature);
  } catch (e) {
    showError(e.code === 4001 ? "Signature rejected." : "Signing failed.");
  }
}

async function onVerified(signature) {
  closeModal();
  connected = true;

  const refCode = generateRef(currentAccount);
  const referredBy = getRefFromURL();

  // Refresh data from Supabase
  await loadDB();

  document.getElementById('navBtn').innerHTML = `<button class="btn-green">✅ ${shortAddr(currentAccount)}</button>`;
  document.getElementById('dWalletName').textContent = "Connected";
  document.getElementById('dWalletAddr').textContent = shortAddr(currentAccount);

  const inviteURL = window.location.origin + window.location.pathname + '?ref=' + refCode;
  document.getElementById('invLink').textContent = inviteURL;

  updateStats();
  showScreen('dashboard');
  showToast('🎉 Successfully Signed & Saved!');
}

// ====================== CONNECT BUTTONS ======================
function connectMetaMask() {
  document.getElementById('mIcon').textContent='🦊';
  document.getElementById('mName').textContent='MetaMask';
  document.getElementById('mStatus').textContent='Waiting for approval...';
  showModal();
  connectEVM();
}

function connectCoinbase() {
  document.getElementById('mIcon').textContent='🔵';
  document.getElementById('mName').textContent='Coinbase Wallet';
  document.getElementById('mStatus').textContent='Waiting for approval...';
  showModal();
  connectEVM();
}

function connectTrust() {
  document.getElementById('mIcon').textContent='🛡️';
  document.getElementById('mName').textContent='Trust Wallet';
  document.getElementById('mStatus').textContent='Waiting for approval...';
  showModal();
  connectEVM();
}

function connectWalletConnect() {
  showToast("Best used inside mobile wallet browser");
  document.getElementById('mIcon').textContent='🔗';
  document.getElementById('mName').textContent='WalletConnect';
  document.getElementById('mStatus').textContent='Waiting for approval...';
  showModal();
  connectEVM();
}

// showModal, closeModal, showError, showStep2, updateStats, renderLeaderboard, switchTab, copyLink, showToast, tick(), etc.

// INIT
loadDB();        // Load real data when page opens
tick();
setInterval(tick, 1000);
</script>
